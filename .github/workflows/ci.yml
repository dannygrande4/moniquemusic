name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: TypeScript check (music-theory)
        run: pnpm --filter @melodypath/music-theory run lint

      - name: TypeScript check (shared-types)
        run: pnpm --filter @melodypath/shared-types run lint

      - name: Run music-theory tests
        run: pnpm --filter @melodypath/music-theory run test

      - name: Build frontend
        run: pnpm --filter @melodypath/web run build
