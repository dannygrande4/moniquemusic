# MoniqueMusic — nginx config for dannygrande.com/music
# Add this inside your existing server {} block for dannygrande.com

# Frontend — static files
location /music {
    alias /var/www/moniquemusic/dist;
    try_files $uri $uri/ /music/index.html;

    # Cache static assets aggressively (they have content hashes in filenames)
    location ~* /music/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

